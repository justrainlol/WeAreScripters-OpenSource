name: Automated DevOps Build Wizard

on:
  workflow_dispatch:
    inputs:
      project:
        description: "Target project folder name (lowercase, matching repo folder)"
        required: true
        type: string
      version:
        description: "Release version (e.g., 1.2.3)"
        required: true
        type: string
      entry_file:
        description: "Entry script filename"
        required: true
        type: string
      build_standalone:
        description: "Generate Standalone Binary?"
        required: true
        type: boolean
        default: true
      build_archive:
        description: "Generate Compressed Portable Archive?"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Target
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if (Test-Path "${{ github.event.inputs.project }}/requirements.txt") {
            pip install -r ${{ github.event.inputs.project }}/requirements.txt
          }

      - name: Run PyInstaller Windows Engine
        shell: pwsh
        run: |
          cd ${{ github.event.inputs.project }}
          mkdir downloads -Force
          
          # Detect custom icons dynamically
          $iconFlag = ""
          $icoFile = Get-ChildItem *.ico | Select-Object -First 1
          if ($icoFile) {
            $iconFlag = "--icon=$($icoFile.Name)"
            echo "Detected custom icon: $($icoFile.Name)"
          }

          # 1. Handle Standalone Binary Generation
          if ("${{ github.event.inputs.build_standalone }}" -eq "true") {
            echo "Compiling single exe..."
            pyinstaller --onefile $iconFlag ${{ github.event.inputs.entry_file }}
            Move-Item "dist/$([io.path]::ChangeExtension('${{ github.event.inputs.entry_file }}', '.exe'))" "downloads/${{ github.event.inputs.project }}_v${{ github.event.inputs.version }}_windows_x64.exe" -Force
            Remove-Item "build", "dist" -Recurse -ErrorAction SilentlyContinue
          }

          # 2. Handle Portable Complex Archive Generation
          if ("${{ github.event.inputs.build_archive }}" -eq "true") {
            echo "Compiling workspace folder bundle..."
            pyinstaller --onedir $iconFlag ${{ github.event.inputs.entry_file }}
            
            # Create a staging area matching our production schema layout
            mkdir "temp_zip/${{ github.event.inputs.project }}" -Force
            if (Test-Path "dist/*") { Move-Item "dist/*" "temp_zip/${{ github.event.inputs.project }}/" }
            if (Test-Path "src") { Copy-Item "src" "temp_zip/${{ github.event.inputs.project }}/" -Recurse }
            if (Test-Path "app_assets") { Copy-Item "app_assets" "temp_zip/${{ github.event.inputs.project }}/" -Recurse }
            
            Compress-Archive -Path "temp_zip/*" -DestinationPath "downloads/${{ github.event.inputs.project }}_v${{ github.event.inputs.version }}_windows_x64.zip" -Force
            Remove-Item "build", "dist", "temp_zip" -Recurse -ErrorAction SilentlyContinue
          }

      - name: Upload Windows Binaries Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: ${{ github.event.inputs.project }}/downloads/

  build-linux:
    name: Build Linux Target
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if [ -f "${{ github.event.inputs.project }}/requirements.txt" ]; then
            pip install -r ${{ github.event.inputs.project }}/requirements.txt
          fi

      - name: Run PyInstaller Linux Engine
        run: |
          cd ${{ github.event.inputs.project }}
          mkdir -p downloads
          
          # 1. Handle Standalone Binary Generation
          if [ "${{ github.event.inputs.build_standalone }}" = "true" ]; then
            echo "Compiling raw binary..."
            pyinstaller --onefile ${{ github.event.inputs.entry_file }}
            RAW_NAME=$(basename "${{ github.event.inputs.entry_file }}" .py)
            mv dist/$RAW_NAME downloads/${{ github.event.inputs.project }}_v${{ github.event.inputs.version }}_linux_x64
            rm -rf build dist
          fi

          # 2. Handle Portable Complex Archive Generation
          if [ "${{ github.event.inputs.build_archive }}" = "true" ]; then
            echo "Compiling workspace folder bundle..."
            pyinstaller --onedir ${{ github.event.inputs.entry_file }}
            
            mkdir -p temp_tar/${{ github.event.inputs.project }}
            [ -d dist ] && cp -r dist/* temp_tar/${{ github.event.inputs.project }}/
            [ -d src ] && cp -r src temp_tar/${{ github.event.inputs.project }}/
            [ -d app_assets ] && cp -r app_assets temp_tar/${{ github.event.inputs.project }}/
            
            tar -czf downloads/${{ github.event.inputs.project }}_v${{ github.event.inputs.version }}_linux_x64.tar.gz -C temp_tar .
            rm -rf build dist temp_tar
          fi

      - name: Upload Linux Binaries Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: ${{ github.event.inputs.project }}/downloads/

  deploy:
    name: Save and Commit Binaries
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-builds
          path: ${{ github.event.inputs.project }}/downloads

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-builds
          path: ${{ github.event.inputs.project }}/downloads

      - name: Commit Binaries to Git Repository
        run: |
          git config --global user.name "WeAreScripters-DevOps"
          git config --global user.email "devops@wearescripters.com"
          git add ${{ github.event.inputs.project }}/downloads/*
          
          # Only commit if actual modifications exist to stop workflow pipeline faults
          if git diff --staged --quiet; then
            echo "No new changes to commit."
          else
            git commit -m "DevOps Cloud Auto-Build: ${{ github.event.inputs.project }} v${{ github.event.inputs.version }}"
            git push origin HEAD:${{ github.ref }}
          fi